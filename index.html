<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>WIND | Next-Gen Ecosystem</title>
    
    <script src="https://cdn.tailwindcss.com"></script>
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap-icons@1.11.1/font/bootstrap-icons.css">
    
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-app.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-auth.js"></script>
    <script src="https://www.gstatic.com/firebasejs/8.10.1/firebase-database.js"></script>

    <style>
        body { background-color: #050505; color: white; font-family: sans-serif; }
        .glass { background: rgba(20, 20, 20, 0.8); backdrop-filter: blur(12px); border: 1px solid rgba(255,255,255,0.05); }
        .btn-purple { background: linear-gradient(135deg, #8b5cf6 0%, #6d28d9 100%); transition: 0.3s; }
        .btn-purple:hover { transform: translateY(-2px); box-shadow: 0 5px 20px rgba(139, 92, 246, 0.4); }
        input, select { background: #111 !important; border: 1px solid #222 !important; color: white !important; padding: 12px; border-radius: 12px; outline: none; }
        .hidden-panel { display: none !important; }
    </style>
</head>
<body class="overflow-x-hidden">

    <nav class="fixed w-full z-50 p-6 flex justify-between items-center glass">
        <div class="text-2xl font-black italic tracking-tighter">WIND</div>
        <div id="user-info" class="text-xs font-bold text-gray-400">Гость</div>
    </nav>

    <section id="hero" class="min-h-screen flex flex-col justify-center items-center text-center px-6">
        <h1 class="text-6xl font-black mb-4">WIND <span class="text-purple-500">CLIENT</span></h1>
        <p class="text-gray-500 max-w-md mb-8">Лучшее решение для игры. Регистрация доступна ниже.</p>
        <a href="#auth-box" class="btn-purple px-8 py-3 rounded-xl font-bold">НАЧАТЬ</a>
    </section>

    <section id="auth-box" class="py-20 flex justify-center">
        <div class="glass p-8 rounded-[2rem] w-full max-w-md mx-4">
            <div class="flex justify-around mb-8 border-b border-white/5 pb-4">
                <button onclick="showTab('login')" id="btn-login" class="text-purple-500 font-bold">ВХОД</button>
                <button onclick="showTab('reg')" id="btn-reg" class="text-gray-500">РЕГИСТРАЦИЯ</button>
            </div>

            <div id="panel-login" class="flex flex-col gap-4">
                <input type="email" id="email-log" placeholder="Email">
                <input type="password" id="pass-log" placeholder="Пароль">
                <button onclick="loginUser()" class="btn-purple py-3 rounded-xl font-bold">ВОЙТИ</button>
            </div>

            <div id="panel-reg" class="hidden-panel flex flex-col gap-4">
                <input type="text" id="nick-reg" placeholder="Никнейм">
                <input type="email" id="email-reg" placeholder="Email">
                <input type="password" id="pass-reg" placeholder="Пароль">
                <button onclick="registerUser()" class="btn-purple py-3 rounded-xl font-bold">СОЗДАТЬ</button>
            </div>
        </div>
    </section>

    <section id="shop" class="py-20 text-center">
        <h2 class="text-3xl font-bold mb-10 text-purple-400">КУПИТЬ ПОДПИСКУ</h2>
        <div class="flex flex-wrap justify-center gap-6 px-6">
            <div class="glass p-6 rounded-3xl w-64 border-t-2 border-purple-500/30">
                <h3 class="text-xl font-bold mb-4">Навсегда</h3>
                <p class="text-gray-500 mb-6 text-sm">Полный доступ ко всем функциям.</p>
                <a href="https://t.me/los_angeles_love" class="block bg-white text-black py-2 rounded-lg font-bold">В ЛС ТГ</a>
            </div>
            <div class="glass p-6 rounded-3xl w-64">
                <h3 class="text-xl font-bold mb-4">Бот Оплаты</h3>
                <p class="text-gray-500 mb-6 text-sm">Автоматическая покупка ключей.</p>
                <a href="https://t.me/TetrisWindClientbot" class="block btn-purple py-2 rounded-lg font-bold">ОТКРЫТЬ БОТА</a>
            </div>
        </div>
    </section>

    <div id="admin-panel" class="fixed inset-0 bg-[#050505] z-[100] hidden-panel overflow-y-auto p-8">
        <div class="max-w-4xl mx-auto">
            <div class="flex justify-between items-center mb-10">
                <h2 class="text-3xl font-black text-purple-500 italic">ADMIN TERMINAL</h2>
                <button onclick="location.reload()" class="bg-red-600 px-4 py-2 rounded-lg font-bold">ВЫХОД</button>
            </div>

            <div class="grid grid-cols-1 md:grid-cols-2 gap-8">
                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs uppercase text-gray-500 font-bold mb-4">Генерация ключей</h3>
                    <select id="key-type" class="w-full mb-4">
                        <option value="30_days">30 Дней</option>
                        <option value="183_days">183 Дня</option>
                        <option value="360_days">360 Дней</option>
                        <option value="lifetime">Навсегда</option>
                        <option value="lifetime_premium">Навсегда Premium</option>
                        <option value="premium_plus">Premium+</option>
                        <option value="lifetime_premium_plus">Навсегда Premium+</option>
                    </select>
                    <button onclick="genKey()" class="w-full btn-purple py-3 rounded-xl font-bold">СОЗДАТЬ КЛЮЧ</button>
                </div>

                <div class="glass p-6 rounded-3xl">
                    <h3 class="text-xs uppercase text-gray-500 font-bold mb-4">Выдача прав</h3>
                    <input type="text" id="target-uid" placeholder="UID пользователя" class="w-full mb-4">
                    <div class="flex gap-2">
                        <button onclick="setRank('Moderator')" class="flex-1 bg-blue-600 py-2 rounded-lg font-bold">MODER</button>
                        <button onclick="setRank('Admin')" class="flex-1 bg-red-600 py-2 rounded-lg font-bold">ADMIN</button>
                    </div>
                </div>
            </div>

            <div class="mt-8 glass p-6 rounded-3xl h-48 overflow-y-auto text-xs font-mono text-green-400" id="console">
                > Система готова к работе...
            </div>
        </div>
    </div>

    <script>
        // ТВОИ ДАННЫЕ FIREBASE
        const firebaseConfig = {
            apiKey: "AIzaSyDy4mU5xpso1OtTA86rbABnwXU6xH_Y5Jk",
            authDomain: "wind-client-b6c33.firebaseapp.com",
            databaseURL: "https://wind-client-b6c33-default-rtdb.firebaseio.com",
            projectId: "wind-client-b6c33",
            storageBucket: "wind-client-b6c33.appspot.com"
        };

        // Инициализация
        if (!firebase.apps.length) {
            firebase.initializeApp(firebaseConfig);
        }
        const auth = firebase.auth();
        const db = firebase.database();

        // ПЕРЕКЛЮЧЕНИЕ ВКЛАДОК
        function showTab(tab) {
            if(tab === 'login') {
                document.getElementById('panel-login').classList.remove('hidden-panel');
                document.getElementById('panel-reg').classList.add('hidden-panel');
                document.getElementById('btn-login').style.color = '#8b5cf6';
                document.getElementById('btn-reg').style.color = '#666';
            } else {
                document.getElementById('panel-login').classList.add('hidden-panel');
                document.getElementById('panel-reg').classList.remove('hidden-panel');
                document.getElementById('btn-reg').style.color = '#8b5cf6';
                document.getElementById('btn-login').style.color = '#666';
            }
        }

        // РЕГИСТРАЦИЯ
        function registerUser() {
            const email = document.getElementById('email-reg').value;
            const pass = document.getElementById('pass-reg').value;
            const nick = document.getElementById('nick-reg').value;

            if(!email || !pass || !nick) return alert("Заполни все поля!");

            auth.createUserWithEmailAndPassword(email, pass)
                .then((cred) => {
                    db.ref('users/' + cred.user.uid).set({
                        username: nick,
                        rank: 'User',
                        sub: 'None'
                    });
                    alert("Аккаунт создан! Теперь войди.");
                    showTab('login');
                })
                .catch(err => alert(err.message));
        }

        // ВХОД
        function loginUser() {
            const email = document.getElementById('email-log').value;
            const pass = document.getElementById('pass-log').value;

            auth.signInWithEmailAndPassword(email, pass)
                .then((cred) => {
                    document.getElementById('user-info').innerText = email;
                    
                    // ТУТ УСЛОВИЕ ДЛЯ АДМИНКИ (Замени на свой email)
                    if(email === 'developer@wind.com') {
                        document.getElementById('admin-panel').classList.remove('hidden-panel');
                    } else {
                        alert("Вход выполнен! Вы обычный пользователь.");
                    }
                })
                .catch(err => alert("Ошибка: " + err.message));
        }

        // АДМИН-ФУНКЦИИ
        function genKey() {
            const type = document.getElementById('key-type').value;
            const key = "WIND-" + Math.random().toString(36).substring(2, 10).toUpperCase();
            
            db.ref('license_keys/' + key).set({ plan: type, status: 'active' });
            
            const log = document.getElementById('console');
            log.innerHTML += `<br>> Ключ ${key} создан (${type})`;
            log.scrollTop = log.scrollHeight;
            alert("Ключ: " + key);
        }

        function setRank(rank) {
            const uid = document.getElementById('target-uid').value;
            if(!uid) return alert("Нужен UID!");
            db.ref('users/' + uid).update({ rank: rank });
            alert("Ранг обновлен!");
        }
    </script>
</body>
</html>
